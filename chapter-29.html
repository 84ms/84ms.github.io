            localStorage.setItem('84ms-scroll', String(docHeight > 0 ? scrollTop / docHeight : 0));
        }
        function init() {
            window.addEventListener('scroll', update);
            // Restore scroll position
            var saved = localStorage.getItem('84ms-scroll');
            var savedPage = localStorage.getItem('84ms-page');
            if (saved && savedPage === 'chapter-29.html') {
                requestAnimationFrame(function() {
                    var docHeight = document.documentElement.scrollHeight - window.innerHeight;
                    window.scrollTo(0, parseFloat(saved) * docHeight);
                });
            }
            update();
        }
        window.addEventListener("content-ready", init);
    })();
    </script>
</body>
